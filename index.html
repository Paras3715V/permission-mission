<!DOCTYPE html>
<html>
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>MissionGram</title>

<style>

*{
box-sizing:border-box;
}

body{
margin:0;
font-family:Arial;
background:#fafafa;
}

/* TOP BAR */

.header{

position:sticky;
top:0;

background:white;

padding:14px;

font-weight:bold;

font-size:20px;

display:flex;

justify-content:center;

border-bottom:1px solid #ddd;

}

/* STORIES */

.stories{

display:flex;

overflow-x:auto;

padding:12px;

gap:14px;

background:white;

border-bottom:1px solid #eee;

}

.story{

text-align:center;

font-size:12px;

}

.circle{

width:70px;
height:70px;

border-radius:50%;

padding:3px;

background:linear-gradient(45deg,#feda75,#fa7e1e,#d62976,#962fbf);

display:flex;
align-items:center;
justify-content:center;

}

.circle img{

width:62px;
height:62px;

border-radius:50%;

background:white;

}

/* FEED */

.feed{

padding:10px;

}

/* POST CARD */

.post{

background:white;

border-radius:12px;

margin-bottom:14px;

box-shadow:0 2px 8px rgba(0,0,0,0.05);

overflow:hidden;

}

.post-header{

padding:10px;

font-weight:bold;

}

.post-img{

height:200px;

background:linear-gradient(135deg,#eafff1,#ffffff);

display:flex;

align-items:center;

justify-content:center;

font-size:40px;

}

.post-body{

padding:12px;

font-size:14px;

}

.button{

width:100%;

padding:14px;

border:none;

border-radius:10px;

font-weight:bold;

font-size:16px;

margin-top:10px;

}

.green{

background:#2ecc71;
color:white;

}

.red{

background:#ff4d4d;
color:white;

}

/* ESCAPING BUTTON */

#no{

position:relative;

}

</style>

</head>

<body>

<div class="header">
MissionGram 🚀
</div>

<!-- STORIES -->

<div class="stories">

<div class="story">
<div class="circle">
<img src="https://i.pravatar.cc/100?img=12">
</div>
Commander
</div>

<div class="story">
<div class="circle">
<img src="https://i.pravatar.cc/100?img=3">
</div>
Utkarsh
</div>

<div class="story">
<div class="circle">
<img src="https://i.pravatar.cc/100?img=5">
</div>
OTA
</div>

<div class="story">
<div class="circle">
<img src="https://i.pravatar.cc/100?img=7">
</div>
Lunch
</div>

</div>

<!-- FEED -->

<div class="feed">

<div class="post">

<div class="post-header">
Mission Request
</div>

<div class="post-img">
🎯
</div>

<div class="post-body">

Meet Utkarsh Bhaiya  
Collect OTA merch  
Lunch at Connaught Place  

<button class="button green" onclick="approve()">Approve Mission</button>

<button class="button red" id="no">Deny</button>

</div>

</div>

<div class="post">

<div class="post-header">
Mission Status
</div>

<div class="post-img">
🛰
</div>

<div class="post-body">

System Online  
Radar Active  
Commander Detected  

</div>

</div>

</div>

<script>

let no=document.getElementById("no");

no.addEventListener("mouseover",move);
no.addEventListener("touchstart",move);

function move(){

let x=Math.random()*200-100;
let y=Math.random()*200-100;

no.style.transform=`translate(${x}px,${y}px)`;

}

function approve(){

alert("Mission Approved 🎉");

}

</script>

</body>
</html>
