<!DOCTYPE html>
<html>

<head>

<meta charset="UTF-8">

<!-- THIS LINE FIXES MOBILE ZOOM -->
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Mission Control</title>

<style>

/* GLOBAL RESET */

*{
margin:0;
padding:0;
box-sizing:border-box;
}

/* PAGE SETTINGS */

html,body{
width:100%;
overflow-x:hidden;
font-family:Arial, sans-serif;
background:#f5f5f5;
}

/* APP CONTAINER (LIKE MOBILE APP WIDTH) */

.app{

width:100%;

max-width:430px;

margin:auto;

min-height:100vh;

background:white;

}

/* HEADER */

.header{

position:sticky;

top:0;

background:white;

padding:16px;

text-align:center;

font-size:20px;

font-weight:bold;

border-bottom:1px solid #eee;

}

/* CONTENT AREA */

.content{

padding:16px;

}

/* CARD STYLE */

.card{

background:white;

border-radius:14px;

padding:18px;

margin-bottom:14px;

box-shadow:0 3px 10px rgba(0,0,0,0.06);

}

/* BUTTONS */

button{

width:100%;

padding:16px;

font-size:18px;

border:none;

border-radius:12px;

margin-top:10px;

}

.primary{

background:#2ecc71;

color:white;

}

.danger{

background:#ff4d4d;

color:white;

}

/* INPUT */

input{

width:100%;

padding:14px;

font-size:16px;

border-radius:10px;

border:1px solid #ccc;

margin-top:10px;

}

</style>

</head>

<body>

<div class="app">

<div class="header">
Mission Control 🚀
</div>

<div class="content">

<div class="card">

<h3>Mission Request</h3>

<p>Meet Utkarsh Bhaiya</p>
<p>Collect OTA merch</p>
<p>Lunch at Connaught Place</p>

<button class="primary">Approve Mission</button>

<button class="danger">Deny</button>

</div>

<div class="card">

<h3>Status</h3>

<p>🟢 System Online</p>
<p>🛰 Radar Active</p>

</div>

</div>

</div>

</body>
</html>
