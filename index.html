<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Mission Approval Portal</title>

<style>

/* Animated Background */

body{
margin:0;
font-family:monospace;
text-align:center;
color:white;
overflow-x:hidden;

background: linear-gradient(-45deg,#0f2027,#203a43,#2c5364,#1a2a6c);
background-size:400% 400%;
animation:gradientBG 10s ease infinite;
}

@keyframes gradientBG{
0%{background-position:0% 50%;}
50%{background-position:100% 50%;}
100%{background-position:0% 50%;}
}

/* Main layout */

h1{
margin-top:60px;
font-size:40px;
}

p{
font-size:20px;
}

/* Buttons */

button{
padding:12px 25px;
font-size:18px;
border:none;
border-radius:10px;
cursor:pointer;
margin:15px;
transition:0.3s;
}

button:hover{
transform:scale(1.1);
box-shadow:0 0 20px #00ffd5;
}

#yes{
background:#2ecc71;
color:white;
}

#no{
background:#e74c3c;
color:white;
position:absolute;
}

/* Radar */

#radar{
width:250px;
height:250px;
border:4px solid #00ff99;
border-radius:50%;
margin:30px auto;
position:relative;
overflow:hidden;
}

#scan{
width:100%;
height:100%;
background:linear-gradient(90deg,transparent,rgba(0,255,0,0.5));
animation:spin 3s linear infinite;
}

@keyframes spin{
0%{transform:rotate(0deg)}
100%{transform:rotate(360deg)}
}

/* Certificate */

#certificate{
display:none;
background:white;
color:black;
padding:30px;
width:320px;
margin:30px auto;
border:6px solid gold;
border-radius:12px;
font-family:serif;
}

/* Hearts */

.heart{
position:fixed;
font-size:20px;
animation:float 6s linear infinite;
}

@keyframes float{
0%{transform:translateY(100vh);}
100%{transform:translateY(-10vh);}
}

/* Confetti */

@keyframes fall{
to{
transform:translateY(100vh) rotate(720deg);
}
}

</style>
</head>

<body>

<h1>MISSION APPROVAL SYSTEM</h1>

<div id="radar">
<div id="scan"></div>
</div>

<p id="missionText"></p>

<button id="yes" onclick="approve()">Permission Granted</button>
<button id="no">Permission Denied</button>

<div id="certificate">

<h2>MISSION APPROVAL CERTIFICATE</h2>

<p>This document certifies that</p>

<h3 id="commanderName">Commander</h3>

<p>has approved the mission for</p>

<h3>Paras</h3>

<p>Mission Objective:</p>

<p>
Meet Utkarsh Bhaiya → Collect OTA merch → Lunch at CP → Return safely
</p>

<p>Status: APPROVED ✅</p>

<p>Authorized by: The Best Girlfriend in the World ❤️</p>

</div>

<script>

/* Typing Effect */

let text="Requesting permission to meet Utkarsh Bhaiya, collect OTA merchandise, and have lunch at Connaught Place.";
let i=0;

function typing(){

if(i<text.length){
document.getElementById("missionText").innerHTML+=text.charAt(i);
i++;
setTimeout(typing,40);
}

}

typing();

/* Moving NO button */

const noBtn=document.getElementById("no");
let attempts=0;

noBtn.addEventListener("mouseover",function(){

attempts++;

const x=Math.random()*(window.innerWidth-100);
const y=Math.random()*(window.innerHeight-100);

noBtn.style.left=x+"px";
noBtn.style.top=y+"px";

if(attempts==5){
alert("⚠️ System Suggestion: Please choose 'Permission Granted' 😌");
}

});

/* Approve Mission */

function approve(){

let name=prompt("Enter Commander Name");

document.getElementById("commanderName").innerText=name;

document.getElementById("certificate").style.display="block";

confetti();

}

/* Confetti */

function confetti(){

for(let i=0;i<150;i++){

let c=document.createElement("div");

c.style.position="fixed";
c.style.width="8px";
c.style.height="8px";

c.style.background=`hsl(${Math.random()*360},100%,50%)`;

c.style.left=Math.random()*100+"vw";

c.style.top="-10px";

c.style.animation="fall 3s linear forwards";

document.body.appendChild(c);

}

}

/* Floating hearts */

setInterval(()=>{

let heart=document.createElement("div");

heart.className="heart";

heart.innerHTML="❤️";

heart.style.left=Math.random()*100+"vw";

document.body.appendChild(heart);

setTimeout(()=>heart.remove(),6000);

},600);

</script>

</body>
</html>
