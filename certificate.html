<!DOCTYPE html>
<html>

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">

<title>Mission Certificate</title>

<link rel="stylesheet" href="style.css">

<style>

.stamp{

font-size:38px;
color:red;
border:4px solid red;
display:inline-block;
padding:10px 25px;
transform:rotate(-15deg) scale(0);
margin-top:20px;
opacity:0;

animation:stampAnim 1s forwards;
animation-delay:0.6s;

}

@keyframes stampAnim{

0%{
transform:rotate(-15deg) scale(3);
opacity:0;
}

60%{
transform:rotate(-15deg) scale(0.9);
opacity:1;
}

100%{
transform:rotate(-15deg) scale(1);
opacity:1;
}

}

.download{

margin-top:20px;
background:#3498db;
color:white;

}

canvas{

position:fixed;
top:0;
left:0;
pointer-events:none;

}

</style>

</head>

<body>

<div class="center">

<div class="certificate" id="certificate">

<h1>🎖 Mission Approved</h1>

<p>This certifies that</p>

<h2 id="personName"></h2>

<p>has officially granted permission for</p>

<h3>Paras Singh</h3>

<p>to execute the mission:</p>

<p>

Meet Utkarsh Bhaiya<br>
Collect OTA Merch<br>
Lunch at Connaught Place

</p>

<div class="stamp">APPROVED</div>

<button class="download" onclick="downloadCertificate()">
Download Certificate
</button>

</div>

</div>

<canvas id="confetti"></canvas>

<script src="https://html2canvas.hertzen.com/dist/html2canvas.min.js"></script>

<script src="script.js"></script>

</body>

</html>
